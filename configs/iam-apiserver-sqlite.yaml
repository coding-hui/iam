# iam-apiserver SQLite quick start config
# This config uses SQLite + in-memory cache for local development quick start
# No MySQL or Redis required

# RESTful 服务配置
server:
  mode: debug # server mode: release, debug, test，默认 release
  healthz: true # 是否开启健康检查，如果开启会安装 /healthz 路由，默认 true
  middlewares: recovery,logger,secure,nocache,cors # 加载的 gin 中间件列表，多个中间件，逗号(,)隔开
  maxPingCount: 3 # http 服务启动后，自检尝试次数，默认 3
  staticLocations: template/*

# GRPC 服务配置
grpc:
  required: false
  bindAddress: 0.0.0.0 # grpc 安全模式的 IP 地址，默认 0.0.0.0
  bindPort: 0 # grpc 安全模式的端口号，设置为 0 表示不启用 默认 8081

# HTTP 配置
insecure:
  bindAddress: 0.0.0.0 # 绑定的不安全 IP 地址，设置为 0.0.0.0 表示使用全部网络接口，默认为 127.0.0.1
  bindPort: 8000 # 提供非安全认证的监听端口，默认为 8080

# HTTPS 配置
secure:
  required: false
  bindAddress: 0.0.0.0 # HTTPS 安全模式的 IP 地址，默认为 0.0.0.0
  bindPort: 0 # 使用 HTTPS 安全模式的端口号，设置为 0 表示不启用 HTTPS，默认为 8443

# SQLite 数据库配置（用于本地快速启动）
sqlite:
  database: iam.db # SQLite 数据库文件路径

# Redis 配置（单实例模式下可不用，但配置仍需保留）
redis:
  host: 127.0.0.1 # redis 地址，默认 127.0.0.1:6379
  port: 6379 # redis 端口，默认 6379
  password: "" # redis 密码

# Cache 配置：使用内存缓存（无需 Redis）
cache:
  type: InMemoryCache
  options:
    cleanupPeriod: 2h # 清理过期缓存的周期

log:
  name: apiserver # Logger的名字
  development: true # 是否是开发模式。如果是开发模式，会对DPanicLevel进行堆栈跟踪。
  level: debug # 日志级别，优先级从低到高依次为：debug, info, warn, error, dpanic, panic, fatal。
  format: console # 支持的日志输出格式，目前支持console和json两种。console其实就是text格式。
  enableColor: true # 是否开启颜色输出，true:是，false:否
  disableCaller: false # 是否开启 caller，如果开启会在日志中显示调用日志所在的文件、函数和行号
  disableStacktrace: false # 是否再panic及以上级别禁止打印堆栈信息
  outputPaths: stdout # 支持输出到多个输出，逗号分开。支持输出到标准输出（stdout）和文件。
  errorOutputPaths: stdout # zap内部(非业务)错误日志输出路径，多个输出，逗号分开

feature:
  enableMetrics: false # 关闭 metrics，减少依赖
  profiling: false # 关闭性能分析，减少依赖

authentication:
  domain: wecoding.local
  jwtSecret: dfVpOK8LZeJLZHYmHdb1VdyRrACKpqoo
  oauth:
    issuer: iam-apiserver
    accessTokenMaxAge: 2h
    accessTokenInactivityTimeout: 2h
    clients:
    - name: iamctl
      grantMethod: auto
      redirectURIs:
      - "urn:ietf:wg:oauth:2.0:oob"
      accessTokenMaxAge: 2h
      accessTokenInactivityTimeout: 2h
