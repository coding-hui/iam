# iam-authzserver 全配置

# IAM rpc 服务地址
rpcserver: localhost:8081 # iam-apiserver grpc 服务器地址和端口

# TLS客户端证书文件
clientCaFile: ${IAM_CONFIG_DIR}/cert/ca.pem

# RESTful 服务配置
server:
  mode: debug # server mode: release, debug, test，默认release
  healthz: true # 是否开启健康检查，如果开启会安装 /healthz 路由，默认 true
  middlewares: recovery,logger,secure,nocache,cors,dump # 加载的 gin 中间件列表，多个中间件，逗号(,)隔开

# HTTP 配置
insecure:
  bindAddress: 0.0.0.0
  bindPort: ${IAM_AUTHZ_SERVER_INSECURE_BIND_PORT}

# HTTPS 配置
secure:
  required: true
  bindAddress: 0.0.0.0
  bindPort: 9443
  tls:
    #certDir: .iam/cert # TLS 证书所在的目录，默认值为 /var/run/iam
    #pairName: iam # TLS 私钥对名称，默认 iam
    certKey:
      certFile: ${IAM_AUTHZ_SERVER_SECURE_TLS_CERT_KEY_CERT_FILE}
      privateKeyFile: ${IAM_AUTHZ_SERVER_SECURE_TLS_CERT_KEY_PRIVATE_KEY_FILE}

# Redis 配置
redis:
  host: 127.0.0.1
  port: 6379
  password: ${REDIS_PASSWORD}
  database: 0 # redis 数据库
  #addrs:
  #masterName: # redis 集群 master 名称
  #username: # redis 登录用户名
  #optimisationMaxIdle:  # redis 连接池中的最大空闲连接数
  #optimisationMaxActive: # 最大活跃连接数
  #timeout: # 连接 redis 时的超时时间
  #enableCluster: # 是否开启集群模式
  #useSsl: # 是否启用 TLS
  #sslInsecureSkipVerify: # 当连接 redis 时允许使用自签名证书

feature:
  enableMetrics: true # 开启 metrics, router:  /metrics
  profiling: true # 开启性能分析, 可以通过 <host>:<port>/debug/pprof/地址查看程序栈、线程等系统信息，默认值为 true
